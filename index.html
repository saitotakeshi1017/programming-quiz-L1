function stripHTML(s){return String(s).replace(/<[^>]+>/g,'');}
function normalize(s){return String(s||'').toLowerCase().replace(/[.,;:!?()[\]{}"']/g,'').replace(/\s+/g,' ').trim();}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}} function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}} function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}
function startRound(){order=shuffle(BANK.map((_,i)=>i)); pos=0; score=0; wrongLog=[]; answered=false; results={}; round=Number(lsGet(STORAGE_PREFIX+'round')||1); elRound.textContent=round; elBest.textContent=lsGet(STORAGE_PREFIX+'best')||'-'; elCompleted.textContent=lsGet(STORAGE_PREFIX+'completed')||'0'; renderQuestion();}
function renderNav(){elNav.innerHTML=''; order.forEach((qi,i)=>{const q=BANK[qi]; const b=document.createElement('button'); b.className='qjump'+(i===pos?' current':'')+(results[q.title]?.answered?(results[q.title].correct?' done':' miss'):''); b.textContent=i+1; b.title=q.title; b.onclick=()=>{pos=i; renderQuestion();}; elNav.appendChild(b);});}
function renderQuestion(){if(pos>=order.length)return renderResult(); answered=false; dragState={selected:null,placements:{}}; currentDD=null; const item=BANK[order[pos]]; elQIdx.textContent=pos+1; elProg.style.width=(pos/order.length*100)+'%'; renderNav(); const tagMap={mc:'Multiple choice',output:'Output prediction',match:'Drag & match',order:'Drag & order',categorize:'Drag & sort',fill:'Fill blanks'}; let html=`<div class="qnum">Question ${pos+1} of ${order.length}<span class="qtype-tag">${tagMap[item.type]}</span></div><p class="qtext">${item.q}</p>`; if(item.code) html+=`<pre class="codeblock">${escapeHTML(item.code)}</pre>`; if(item.type==='mc'||item.type==='output') html+=renderMC_HTML(item); else if(item.type==='fill') html+=renderFill_HTML(item); else html+=renderDD_HTML(item); html+=`<div class="feedback" id="fb"></div><div class="actions" id="acts"><button class="btn ghost" onclick="prevQ()">Previous</button><button class="btn ghost" onclick="showAnswer()">Show answer</button><button class="btn ghost" onclick="resetQuestion()">Reset question</button><button class="btn" onclick="nextQ()">${pos+1===order.length?'Results':'Next'}</button></div>`; elCard.innerHTML=html; if(item.type==='mc'||item.type==='output')attachMC(item); else if(item.type==='fill')attachFill(item); else attachDD(item); updateBar();}
function updateBar(){const vals=Object.values(results).filter(x=>x.answered); const good=vals.filter(x=>x.correct).length; elScore.textContent=good;}
function renderMC_HTML(item){item._shuf=shuffle(item.choices.map((_,i)=>i)); return `<div class="options">${item._shuf.map((orig,i)=>`<button class="opt" data-i="${i}"><span class="marker">${String.fromCharCode(65+i)}</span>${escapeHTML(item.choices[orig])}</button>`).join('')}</div><p class="small">Auto-checks as soon as you choose an option.</p>`;}
function attachMC(item){document.querySelectorAll('.opt').forEach(btn=>{btn.onclick=()=>{if(answered)return; answered=true; const i=Number(btn.dataset.i), orig=item._shuf[i], ok=orig===item.answer; document.querySelectorAll('.opt').forEach((b,k)=>{b.disabled=true; if(item._shuf[k]===item.answer)b.classList.add('reveal');}); btn.classList.add(ok?'correct':'wrong'); if(ok)score++; else wrongLog.push({q:stripHTML(item.q), info:'Correct: '+item.choices[item.answer]}); results[item.title]={answered:true,correct:ok}; flash((ok?'Correct. ':'Not yet. ')+item.note,ok); updateBar(); renderNav();};});}
function renderFill_HTML(item){return `<div class="fillbox">${item.sentences.map((s,i)=>`<label class="fill-row">${escapeHTML(s.before)}<input data-fill="${i}" autocomplete="off" autocapitalize="none" spellcheck="false" />${escapeHTML(s.after)}</label>`).join('')}</div><p class="small">Correct blanks lock automatically. Wrong blanks are not judged until all blanks have something typed.</p>`;}
function attachFill(item){document.querySelectorAll('input[data-fill]').forEach(inp=>{inp.oninput=()=>checkFill(item);});}
function checkFill(item){const inputs=[...document.querySelectorAll('input[data-fill]')]; let allFilled=inputs.every(i=>i.value.trim().length>0), allCorrect=true; inputs.forEach(inp=>{const obj=item.sentences[Number(inp.dataset.fill)]; const ok=obj.answers.some(a=>normalize(a)===normalize(inp.value)); inp.classList.remove('wrong'); if(ok){inp.classList.add('correct'); inp.disabled=true;} if(!ok)allCorrect=false;}); if(allCorrect){answered=true; results[item.title]={answered:true,correct:true}; flash('Correct. '+item.note,true); renderNav(); updateBar(); return;} if(allFilled){inputs.forEach(inp=>{if(!inp.disabled)inp.classList.add('wrong');}); results[item.title]={answered:true,correct:false}; flash('Not yet. Rework only the red blank or use Show answer.',false); renderNav(); updateBar();}}
function setupDD(item){let cards=[],slots=[],slotOrder=[]; if(item.type==='match'){cards=item.pairs.map((p,i)=>({id:'c'+i,text:p.card,correctSlot:'s'+i})); slots=item.pairs.map((p,i)=>({id:'s'+i,label:p.slot,multi:false})); slotOrder=shuffle(slots.map(s=>s.id));} else if(item.type==='order'){cards=item.items.map((t,i)=>({id:'c'+i,text:t,correctSlot:'s'+i})); slots=item.items.map((_,i)=>({id:'s'+i,label:String(i+1),multi:false})); slotOrder=slots.map(s=>s.id);} else if(item.type==='categorize'){cards=item.items.map((it,i)=>({id:'c'+i,text:it.text,correctSlot:'s'+item.categories.indexOf(it.category)})); slots=item.categories.map((cat,i)=>({id:'s'+i,label:cat,multi:true})); slotOrder=slots.map(s=>s.id);} const cardOrder=shuffle(cards.map(c=>c.id)); return {cards,slots,cardOrder,slotOrder,type:item.type};}
function renderDD_HTML(item){currentDD=setupDD(item); const hint={match:'Tap a card, then tap its matching slot. Tap a placed card to return it.',order:'Tap a card, then tap its numbered position. Tap a placed card to return it.',categorize:'Tap a card, then tap the category zone. Tap a placed card to return it.'}[item.type]; return `<div class="dd-hint">🌿 ${hint}</div><div id="ddArea"></div>`;}
function attachDD(item){renderDDArea(item);}
function renderDDArea(item){const area=document.getElementById('ddArea'); let h=''; if(currentDD.type==='order')h+=renderOrderSlots(); else if(currentDD.type==='match')h+=renderMatchSlots(); else h+=renderCategorizeSlots(); const inBank=currentDD.cardOrder.filter(cid=>!dragState.placements[cid]); h+=`<div class="card-bank"><div class="card-bank-label">Cards (${inBank.length} left)</div><div class="card-bank-cards">`; if(inBank.length===0)h+='<span class="empty-hint">All placed.</span>'; else inBank.forEach(cid=>{const c=currentDD.cards.find(x=>x.id===cid); h+=`<button class="dd-card${dragState.selected===cid?' selected':''}" data-card="${cid}">${escapeHTML(c.text)}</button>`;}); h+='</div></div>'; area.innerHTML=h; area.querySelectorAll('.dd-card').forEach(el=>{el.onclick=(e)=>{e.stopPropagation(); onCardClick(item,el.dataset.card);};}); area.querySelectorAll('[data-slot]').forEach(el=>{el.onclick=()=>onSlotClick(item,el.dataset.slot);}); autoCheckDD(item,false);}
function renderOrderSlots(){let h='<div class="order-list">'; currentDD.slotOrder.forEach(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); h+=`<div class="order-row"><div class="order-num">${slot.label}</div>${slotHTML(sid)}</div>`;}); return h+'</div>';}
function renderMatchSlots(){let h='<div class="match-list">'; currentDD.slotOrder.forEach(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); h+=`<div class="match-row"><div class="match-label">${escapeHTML(slot.label)}</div>${slotHTML(sid)}</div>`;}); return h+'</div>';}
function renderCategorizeSlots(){let h='<div class="cat-zones">'; currentDD.slotOrder.forEach(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); const cards=Object.keys(dragState.placements).filter(cid=>dragState.placements[cid]===sid); h+=`<div class="cat-zone" data-slot="${sid}"><div class="cat-zone-label">${escapeHTML(slot.label)}</div><div class="cat-zone-cards">`; if(cards.length===0)h+='<span class="placeholder">drop cards here</span>'; cards.forEach(cid=>{const c=currentDD.cards.find(x=>x.id===cid); h+=`<button class="dd-card" data-card="${cid}">${escapeHTML(c.text)}</button>`;}); h+='</div></div>';}); return h+'</div>';}
function slotHTML(sid){const cards=Object.keys(dragState.placements).filter(cid=>dragState.placements[cid]===sid); if(cards.length){const cid=cards[0], c=currentDD.cards.find(x=>x.id===cid); return `<div class="slot-target has-card" data-slot="${sid}"><button class="dd-card" data-card="${cid}">${escapeHTML(c.text)}</button></div>`;} return `<div class="slot-target" data-slot="${sid}"><span class="placeholder">tap to place</span></div>`;}
function onCardClick(item,cid){if(answered)return; if(dragState.placements[cid])delete dragState.placements[cid]; else dragState.selected=(dragState.selected===cid)?null:cid; renderDDArea(item);}
function onSlotClick(item,sid){if(answered||!dragState.selected)return; const slot=currentDD.slots.find(s=>s.id===sid); if(!slot.multi)Object.keys(dragState.placements).forEach(cid=>{if(dragState.placements[cid]===sid)delete dragState.placements[cid];}); dragState.placements[dragState.selected]=sid; dragState.selected=null; renderDDArea(item);}
function autoCheckDD(item,showIncomplete){const allPlaced=currentDD.cards.every(c=>dragState.placements[c.id]); if(!allPlaced)return; let ok=currentDD.cards.every(c=>dragState.placements[c.id]===c.correctSlot); if(showIncomplete || allPlaced){answered=true; results[item.title]={answered:true,correct:ok}; renderDDFeedback(); flash((ok?'Correct. ':'Not yet. ')+item.note,ok); renderNav(); updateBar(); if(!ok)wrongLog.push({q:stripHTML(item.q),info:'Review card placement.'});}}
function renderDDFeedback(){document.querySelectorAll('.slot-target,.cat-zone').forEach(x=>x.classList.remove('correct','wrong')); currentDD.cards.forEach(c=>{const sid=dragState.placements[c.id]; if(!sid)return; const sel=`[data-slot="${sid}"]`; const container=document.querySelector(sel); const ok=sid===c.correctSlot; if(container)container.classList.add(ok?'correct':'wrong'); const btn=document.querySelector(`[data-card="${c.id}"]`); if(btn)btn.classList.add(ok?'correct':'wrong');});}
function showAnswer(){const item=BANK[order[pos]]; answered=true; results[item.title]={answered:true,correct:false}; if(item.type==='mc'||item.type==='output'){document.querySelectorAll('.opt').forEach((b,k)=>{b.disabled=true; if(item._shuf[k]===item.answer)b.classList.add('reveal');}); flash('Answer shown. '+item.note,'info');} else if(item.type==='fill'){document.querySelectorAll('input[data-fill]').forEach(inp=>{const obj=item.sentences[Number(inp.dataset.fill)]; inp.value=obj.answers[0]; inp.classList.add('correct'); inp.disabled=true;}); flash('Answer shown. '+item.note,'info');} else {dragState.placements={}; currentDD.cards.forEach(c=>dragState.placements[c.id]=c.correctSlot); renderDDArea(item); document.querySelectorAll('.slot-target,.cat-zone,.dd-card').forEach(x=>x.classList.add('correct')); flash('Answer shown in the correct arrangement. '+item.note,'info');} renderNav(); updateBar();}
function flash(msg,good){const f=document.getElementById('fb'); if(good==='info')f.className='feedback info'; else f.className='feedback '+(good?'good':'bad'); f.innerHTML=msg;}
function resetQuestion(){const item=BANK[order[pos]]; delete results[item.title]; renderQuestion();}
function prevQ(){pos=(pos-1+order.length)%order.length; renderQuestion();} function nextQ(){pos++; if(pos>=order.length)renderResult(); else renderQuestion();}
function renderResult(){elProg.style.width='100%'; const total=order.length; const good=Object.values(results).filter(x=>x.correct).length; const pct=Math.round(good/total*100); const best=Number(lsGet(STORAGE_PREFIX+'best')||0); if(good>best)lsSet(STORAGE_PREFIX+'best',String(good)); const completed=Number(lsGet(STORAGE_PREFIX+'completed')||0)+1; lsSet(STORAGE_PREFIX+'completed',String(completed)); round++; lsSet(STORAGE_PREFIX+'round',String(round)); elCompleted.textContent=completed; elBest.textContent=lsGet(STORAGE_PREFIX+'best')||'-'; elCard.innerHTML=`<div class="result"><h2>Round complete</h2><div class="score-big">${good} / ${total}</div><p>${pct}% correct. ${pct>=90?'Nine-tenths territory. Keep one more pass for insurance.':'Run the mistakes once, then one full random pass.'}</p><div class="actions" style="justify-content:center"><button class="btn" onclick="startRound()">Play another round</button><button class="btn ghost" onclick="clearProgress()">Reset saved progress</button></div><div class="review-list"><h3>Answer Key Snapshot</h3>${BANK.map((q,i)=>`<div class="review-item"><b>${i+1}. ${escapeHTML(q.title)}</b><br>${escapeHTML(q.note)}</div>`).join('')}</div></div>`; renderNav();}
function clearProgress(){['best','completed','round'].forEach(k=>lsDel(STORAGE_PREFIX+k)); startRound();}
startRound();
</script>
</body>
</html>
